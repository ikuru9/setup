# -------------------------------------------------
# Font
# -------------------------------------------------
font-size = 14
font-family = FiraCode NF Retina
adjust-cell-height = 5%
adjust-cell-width = 0%

# -------------------------------------------------
# Cursor
# -------------------------------------------------
cursor-style = block
cursor-style-blink = true
cursor-opacity = 0.9

# -------------------------------------------------
# Window / Layout
# -------------------------------------------------
window-padding-x = 10
window-padding-y = 10

window-decoration = true

# -------------------------------------------------
# Scroll
# -------------------------------------------------
scrollback-limit = 10000
scroll-multiplier = 3

# -------------------------------------------------
# Theme
# -------------------------------------------------
theme = Catppuccin Frappe

# -------------------------------------------------
# Behavior
# -------------------------------------------------
working-directory = /Users/mareem/Git

confirm-close-surface = false
copy-on-select = false
focus-follows-mouse = true
macos-option-as-alt = true

# -------------------------------------------------
# Directory inherit
# -------------------------------------------------
window-inherit-working-directory = true
