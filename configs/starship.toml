# -------------------------------------------------
# Starship prompt config
# -------------------------------------------------

# 외부 명령(git 등) 실행 최대 대기 시간 (ms)
# 큰 레포에서 timeout 방지용
command_timeout = 3000

# 파일 시스템 스캔 시간 제한 (ms)
# 너무 낮으면 일부 정보가 안 뜰 수 있음
scan_timeout = 30

# -------------------------------------------------
# LEFT prompt
# -------------------------------------------------
format = """
$directory
$line_break
$character
"""

# -------------------------------------------------
# RIGHT prompt
# -------------------------------------------------
right_format = """
$cmd_duration
"""

# -------------------------------------------------
# Directory
# -------------------------------------------------
[directory]
style = "bold cyan"        # 경로 색상 (굵은 시안)
truncation_length = 3      # 최대 3단계까지만 표시
truncate_to_repo = true    # Git repo 기준으로 경로 축약
read_only = " 󰌾"           # 쓰기 권한 없을 때 표시 아이콘
read_only_style = "red"    # 읽기 전용 표시 색상

# -------------------------------------------------
# Git
# -------------------------------------------------
[git_branch]
symbol = " "              # 브랜치 아이콘
style = "bold purple"      # 브랜치 색상
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"           # 전체 상태 색상
format = "([$all_status$ahead_behind]($style)) "
# ↑ 모든 상태 + ahead/behind 정보를 하나로 묶어서 출력

conflicted = "⚠ "          # 충돌 발생
ahead = "⇡${count} "       # 원격보다 앞선 커밋 수
behind = "⇣${count} "      # 원격보다 뒤처진 커밋 수
modified = "✎ "            # 수정된 파일
staged = "+ "              # 스테이징된 파일
untracked = "? "           # 추적 안 된 파일
renamed = "» "             # 이름 변경
deleted = "✘ "             # 삭제됨

# -------------------------------------------------
# Node.js
# -------------------------------------------------
[nodejs]
symbol = " "             # Node 아이콘
format = "[$symbol($version )]($style)"
# ↑ 아이콘 + 버전 표시
style = "bold green"       # 색상

# -------------------------------------------------
# Languages
# -------------------------------------------------
[python]
symbol = " "             # Python 아이콘
style = "blue"
format = "[$symbol($version )]($style)"
# ↑ 가상환경/버전 확인용

[golang]
symbol = " "             # Go 아이콘
style = "cyan"
format = "[$symbol($version )]($style)"

[rust]
symbol = "🦀 "             # Rust 아이콘
style = "red"
format = "[$symbol($version )]($style)"

# -------------------------------------------------
# Command duration
# -------------------------------------------------
[cmd_duration]
min_time = 500            # 0.5초 이상 실행 시만 표시
format = "⏱ [$duration]($style) "
# ↑ 실행 시간 표시
style = "yellow"

# -------------------------------------------------
# Prompt character
# -------------------------------------------------
[character]
success_symbol = "[❯](bold green)"  # 성공 시 프롬프트
error_symbol = "[❯](bold red)"      # 실패 시 프롬프트
