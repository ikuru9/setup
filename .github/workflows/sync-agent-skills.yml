name: Sync agent-skills folder

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Sync upstream agent-skills
        run: bash scripts/sync-agent-skills.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "ikuru9@gmail.com"

          git add agents/skills

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync addyosmani agent-skills"
            git push
          fi
