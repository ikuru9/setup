name: Sync opencode from everything-claude-code

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-opencode
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone upstream repository
        run: |
          git clone --depth=1 https://github.com/affaan-m/everything-claude-code.git /tmp/ecc

      - name: Sync .opencode to opencode
        run: |
          rm -rf ./opencode
          mkdir -p ./opencode

          rsync -av --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --include "*/" \
            --include "opencode.json" \
            --exclude "*" \
            /tmp/ecc/.opencode/ ./opencode/

      - name: Replace model names
        run: |
          find ./opencode -type f \
            ! -path "./opencode/.git/*" \
            -exec perl -0pi -e '
              s|anthropic/claude-opus-4-5|openai/gpt-5.4|g;
              s|anthropic/claude-sonnet-4-5|openai/gpt-5.4|g;
              s|anthropic/claude-haiku-4-5|openai/gpt-5.4-mini|g;
            ' {} +

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- opencode; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add opencode
          git commit -m "chore: sync opencode from everything-claude-code"
          git push